<!DOCTYPE html>
<html>
<head>
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>
  <div id="g_id_onload"
       data-client_id="174257531189-77usoc4o42hmatg9j7a38l9rslcnec8o.apps.googleusercontent.com"
       data-callback="handleCredential">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <script>
    function handleCredential(response) {
      document.getElementById("token").textContent = response.credential;
      console.log(response.credential);
    }
  </script>

  <p>Your Google token:</p>
  <pre id="token" style="word-break:break-all; background:#f0f0f0; padding:10px"></pre>
</body>
</html>
